name: winmon

services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "9000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: winmon
      GF_SECURITY_ADMIN_PASSWORD: winmon
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/winmon-overview.json
    volumes:
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ./grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/winmon.yaml:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/winmon-overview.json:ro
    restart: unless-stopped

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check
      - run: cargo build --release --locked

      - name: check version
        shell: pwsh
        run: |
          $version = (./target/release/winmon.exe -V).Trim()
          if ($version -notmatch $env:GITHUB_REF_NAME.Substring(1)) {
            throw "version mismatch: $version vs $env:GITHUB_REF_NAME"
          }

      - name: package
        shell: pwsh
        run: ./scripts/package.ps1 -Version $env:GITHUB_REF_NAME -TargetDir target

      - name: prepare release assets
        shell: pwsh
        run: |
          $versionedZip = Get-ChildItem ./dist/*.zip | Select-Object -First 1
          $fixedZip = Join-Path $versionedZip.Directory.FullName "winmon-windows-x64.zip"
          Copy-Item $versionedZip.FullName $fixedZip -Force
          $hash = (Get-FileHash -Algorithm SHA256 $fixedZip).Hash.ToLower()
          Set-Content -Path (Join-Path $versionedZip.Directory.FullName "winmon-windows-x64.zip.sha256") -Value "$hash  winmon-windows-x64.zip" -Encoding ascii
          $install = (Get-Content ./scripts/install.ps1 -Raw).Replace("__REPOSITORY__", "${{ github.repository }}")
          Set-Content -Path (Join-Path $versionedZip.Directory.FullName "install.ps1") -Value $install -Encoding ascii
          ./scripts/gen-winget.ps1 -Version $env:GITHUB_REF_NAME.Substring(1) -InstallerSha256 $hash -OutRoot dist/winget/manifests | Out-Null
          $wingetZip = Join-Path $versionedZip.Directory.FullName "winget-manifests-$env:GITHUB_REF_NAME.zip"
          Compress-Archive -Path (Join-Path $versionedZip.Directory.FullName "winget\manifests\*") -DestinationPath $wingetZip -Force

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/winmon-windows-x64.zip.sha256
            dist/install.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
